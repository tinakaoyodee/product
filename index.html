<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作階段成長率分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --border: #E2DDD5;
    --text-primary: #1A1816;
    --text-secondary: #6B6560;
    --accent-palo: #1A5FA8;
    --accent-kigo: #0A6B52;
    --accent-other: #7B56CC;
    --tag-palo-bg: #EAF1FB;
    --tag-palo-text: #0C4480;
    --tag-kigo-bg: #E2F4EE;
    --tag-kigo-text: #085240;
    --tag-other-bg: #F0EBFC;
    --tag-other-text: #5934A8;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 40px 24px;
  }

  .container { max-width: 860px; margin: 0 auto; }

  header { margin-bottom: 36px; }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
  }

  .card-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  .card-value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    font-family: 'DM Mono', monospace;
  }

  .card-value.blue { color: var(--accent-palo); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .filter-btn {
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--surface);
    color: var(--text-secondary);
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: #aaa; color: var(--text-primary); }

  .filter-btn.active {
    background: var(--text-primary);
    color: #fff;
    border-color: var(--text-primary);
  }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 28px 20px;
    margin-bottom: 20px;
  }

  .chart-canvas-wrap {
    position: relative;
    width: 100%;
  }

  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  .tag.帕洛 { background: var(--tag-palo-bg); color: var(--tag-palo-text); }
  .tag.kigo { background: var(--tag-kigo-bg); color: var(--tag-kigo-text); }
  .tag.其他 { background: var(--tag-other-bg); color: var(--tag-other-text); }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAF9F6; }

  tbody td { padding: 11px 16px; vertical-align: middle; }

  .bar-cell { display: flex; align-items: center; gap: 10px; }
  .bar-track { flex: 1; height: 6px; background: #EDE9E2; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-val { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; min-width: 62px; text-align: right; }

  footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }

  @media (max-width: 600px) {
    .cards { grid-template-columns: repeat(3, 1fr); }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">Session Growth Analysis</div>
    <h1>工作階段上升品項</h1>
    <p class="subtitle">各品項工作階段成長率排行 · 依品牌分類</p>
  </header>

  <div class="cards">
    <div class="card">
      <div class="card-label">品項總數</div>
      <div class="card-value" id="c-count">12</div>
    </div>
    <div class="card">
      <div class="card-label">最高成長</div>
      <div class="card-value blue" id="c-max">+440.3%</div>
    </div>
    <div class="card">
      <div class="card-label">平均成長</div>
      <div class="card-value" id="c-avg">+245%</div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterBrand('all',this)">全部</button>
    <button class="filter-btn" onclick="filterBrand('帕洛',this)">帕洛防蚊</button>
    <button class="filter-btn" onclick="filterBrand('kigo',this)">kigo</button>
    <button class="filter-btn" onclick="filterBrand('其他',this)">其他品牌</button>
  </div>

  <div class="chart-wrap">
    <div class="chart-canvas-wrap" id="chart-wrap">
      <canvas id="mainChart" role="img" aria-label="各品項工作階段成長率水平長條圖"></canvas>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#1A5FA8;"></span>帕洛防蚊</div>
      <div class="legend-item"><span class="legend-dot" style="background:#0A6B52;"></span>kigo</div>
      <div class="legend-item"><span class="legend-dot" style="background:#7B56CC;"></span>其他品牌</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>品項</th>
          <th>品牌</th>
          <th style="min-width:200px;">成長率</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <footer>產生於 Claude · 數據來源：工作階段分析報告</footer>
</div>

<script>
const allItems = [
  { label: '防蚊滾珠', value: 440.3, brand: '帕洛' },
  { label: 'unilove cova-ai', value: 410.5, brand: '其他' },
  { label: '法國帕洛天然植萃防蚊系列', value: 403.0, brand: '帕洛' },
  { label: '天然防蚊噴霧三入組', value: 402.4, brand: '帕洛' },
  { label: 'poled airluv4-oreo', value: 295.3, brand: '其他' },
  { label: '精油防蚊兒童手環', value: 218.0, brand: '帕洛' },
  { label: 'kigo city', value: 188.7, brand: 'kigo' },
  { label: '防蚊隨身球', value: 169.4, brand: '帕洛' },
  { label: 'poled airluv4-lollipop', value: 111.1, brand: '其他' },
  { label: 'milk 鎖水芯牛奶尿布', value: 26.2, brand: '其他' },
  { label: 'kigo nature', value: 26.0, brand: 'kigo' },
  { label: 'kigo little monster', value: 12.8, brand: 'kigo' },
];

const brandColors = {
  '帕洛': '#1A5FA8',
  'kigo': '#0A6B52',
  '其他': '#7B56CC',
};

let chart;

function buildChart(items) {
  const h = Math.max(items.length * 44 + 60, 180);
  document.getElementById('chart-wrap').style.height = h + 'px';
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('mainChart'), {
    type: 'bar',
    data: {
      labels: items.map(d => d.label),
      datasets: [{
        data: items.map(d => d.value),
        backgroundColor: items.map(d => brandColors[d.brand] + 'CC'),
        borderColor: items.map(d => brandColors[d.brand]),
        borderWidth: 1,
        borderRadius: 5,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' +' + ctx.raw.toFixed(1) + '%' } }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { callback: v => '+' + v + '%', font: { size: 11, family: "'DM Mono', monospace" }, color: '#6B6560' }
        },
        y: {
          grid: { display: false },
          ticks: { font: { size: 12, family: "'Noto Sans TC', sans-serif" }, color: '#1A1816' }
        }
      }
    }
  });
}

function buildTable(items) {
  const max = Math.max(...items.map(d => d.value));
  document.getElementById('table-body').innerHTML = items.map(d => `
    <tr>
      <td>${d.label}</td>
      <td><span class="tag ${d.brand}">${d.brand === '帕洛' ? '帕洛防蚊' : d.brand}</span></td>
      <td>
        <div class="bar-cell">
          <div class="bar-track">
            <div class="bar-fill" style="width:${(d.value/max*100).toFixed(1)}%;background:${brandColors[d.brand]};"></div>
          </div>
          <span class="bar-val" style="color:${brandColors[d.brand]};">+${d.value.toFixed(1)}%</span>
        </div>
      </td>
    </tr>
  `).join('');
}

function updateCards(items) {
  const vals = items.map(d => d.value);
  document.getElementById('c-count').textContent = items.length;
  document.getElementById('c-max').textContent = '+' + Math.max(...vals).toFixed(1) + '%';
  document.getElementById('c-avg').textContent = '+' + Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) + '%';
}

function filterBrand(brand, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = (brand === 'all' ? [...allItems] : allItems.filter(d => d.brand === brand))
    .sort((a,b) => b.value - a.value);
  buildChart(filtered);
  buildTable(filtered);
  updateCards(filtered);
}

const sorted = [...allItems].sort((a,b) => b.value - a.value);
buildChart(sorted);
buildTable(sorted);
updateCards(sorted);
</script>
</body>
</html>
